name: Plan Week

on:
  schedule:
    # Elke zondag 19:00 UTC (= 21:00 CET / 20:00 CEST)
    - cron: '0 19 * * 0'
  workflow_dispatch: # Handmatig triggeren

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Plan volgende week
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python plan_week.py --schrijf

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state.json after weekly plan"
          git push
