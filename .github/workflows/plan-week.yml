name: Plan Week

on:
  schedule:
    # Dagelijks 05:00 UTC = 07:00 CEST — rolling horizon planning
    - cron: '0 5 * * *'
  workflow_dispatch: # Handmatig triggeren

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Plan komende 2 weken (rolling horizon)
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python plan_week.py --horizon 2 --schrijf

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${GITHUB_REF_NAME} || {
            echo "::warning::Rebase failed — skipping commit to prevent conflict loop"
            exit 0
          }
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes — skipping commit/push"
            exit 0
          fi
          git commit -m "chore: update state.json after weekly plan"
          git push
